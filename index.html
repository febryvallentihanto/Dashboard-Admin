<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Login</title>
    <link rel="icon" type="image/png" href="asset/logo.png">

    <!-- Memuat pustaka Bootstrap 5 untuk utilitas tata letak -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Memuat Bootstrap Icons untuk ikon mata pada input kata sandi -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Gaya dasar untuk tubuh halaman, menyesuaikan warna latar belakang dengan gambar */
        body {
            background-color: #f0f4fd;
            font-family: 'Poppins', sans-serif;
        }

        /* Penyesuaian tata letak dan ukuran kartu login yang lebih kompak dan responsif */
        .login-card {
            width: 90%;
            max-width: 360px;
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        /* Gaya untuk judul 'Login' */
        .login-title {
            font-weight: 700;
            font-size: 1.8rem;
            color: #000000;
            margin-bottom: 30px;
        }

        /* Penyesuaian label formulir (Email dan Password) */
        .form-label {
            font-weight: 700;
            font-size: 0.85rem;
            color: #000000;
            margin-bottom: 8px;
        }

        /* Gaya kustom untuk kotak masukan input */
        .custom-input {
            background-color: #dce5fa;
            border: none;
            height: 45px;
            font-size: 0.95rem;
            border-radius: 6px;
            box-shadow: none !important;
        }

        /* Warna latar tetap sama saat input sedang difokuskan */
        .custom-input:focus {
            background-color: #dce5fa;
            border: 2px solid #a8c1f8;
        }

        /* Pengaturan spesifik untuk kontainer ikon kata sandi agar menyatu dengan input */
        .input-group-custom .custom-input {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }

        .custom-input-btn {
            background-color: #dce5fa;
            border: none;
            border-top-right-radius: 6px;
            border-bottom-right-radius: 6px;
            color: #000000;
            display: flex;
            align-items: center;
            padding: 0 15px;
            cursor: pointer;
        }

        .custom-input-btn:focus {
            outline: none;
        }

        /* Gaya kustom untuk tombol 'Masuk' */
        .btn-masuk {
            background-color: #4285f4;
            color: #ffffff;
            font-weight: 600;
            border: none;
            height: 45px;
            border-radius: 6px;
            font-size: 0.95rem;
            margin-top: 5px;
            transition: background-color 0.3s ease;
        }

        /* Gaya efek interaksi melayang (hover) pada tombol */
        .btn-masuk:hover {
            background-color: #3367d6;
            color: #ffffff;
        }

        /* Modifikasi ukuran font dan padding pada alert agar proporsional */
        .alert-custom {
            font-size: 0.85rem;
            padding: 10px 15px;
            margin-bottom: 20px;
        }

        /* Kueri Media (Media Queries) untuk memastikan responsivitas pada perangkat seluler */
        @media (max-width: 576px) {
            .login-card {
                padding: 30px 20px;
            }

            .login-title {
                font-size: 1.5rem;
                margin-bottom: 25px;
            }
        }
    </style>
</head>

<body class="vh-100 d-flex justify-content-center align-items-center">

    <!-- Kontainer utama kartu login -->
    <div class="login-card">
        <h2 class="text-center login-title">Login</h2>

        <!-- Formulir login dengan ID untuk referensi DOM -->
        <form id="loginForm">

            <!-- Elemen peringatan (alert) yang disematkan di dalam formulir. 
                 Secara bawaan disembunyikan menggunakan kelas 'd-none' -->
            <div id="formAlert" class="alert d-none alert-custom" role="alert">
                <!-- Teks pesan akan disisipkan secara dinamis melalui JavaScript -->
            </div>

            <!-- Kelompok Masukan Email -->
            <div class="mb-3">
                <label for="emailInput" class="form-label">Email</label>
                <!-- Atribut placeholder tetap dipertahankan -->
                <input type="email" class="form-control custom-input w-100" id="emailInput" placeholder="Masukkan email"
                    required>
            </div>

            <!-- Kelompok Masukan Kata Sandi -->
            <div class="mb-4">
                <label for="passwordInput" class="form-label">Password</label>
                <div class="input-group input-group-custom">
                    <!-- Atribut placeholder tetap dipertahankan -->
                    <input type="password" class="form-control custom-input" id="passwordInput"
                        placeholder="Masukkan kata sandi" required>
                    <!-- Tombol untuk beralih mode visibilitas kata sandi -->
                    <button class="custom-input-btn" type="button" id="togglePasswordBtn">
                        <i class="bi bi-eye-slash-fill" id="toggleIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Tombol Eksekusi Aksi (Submit) -->
            <button type="submit" class="btn btn-masuk w-100">Masuk</button>
        </form>
    </div>

    <!-- Script JavaScript untuk menangani validasi dan interaktivitas -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // 1. Inisialisasi variabel elemen DOM untuk fitur "Show/Hide Password"
            const togglePasswordBtn = document.getElementById('togglePasswordBtn');
            const passwordInput = document.getElementById('passwordInput');
            const toggleIcon = document.getElementById('toggleIcon');

            // 2. Inisialisasi variabel elemen DOM untuk fitur Validasi Login
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('emailInput');
            const formAlert = document.getElementById('formAlert');

            // --- Submit via Enter Key ---
            function handleEnterKey(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    loginForm.dispatchEvent(new Event('submit'));
                }
            }
            emailInput.addEventListener('keydown', handleEnterKey);
            passwordInput.addEventListener('keydown', handleEnterKey);

            // --- Logika Interaktivitas Visibilitas Kata Sandi ---
            togglePasswordBtn.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);

                // Memanipulasi ikon visual agar sesuai dengan status visibilitas
                if (type === 'text') {
                    toggleIcon.classList.remove('bi-eye-slash-fill');
                    toggleIcon.classList.add('bi-eye-fill');
                } else {
                    toggleIcon.classList.remove('bi-eye-fill');
                    toggleIcon.classList.add('bi-eye-slash-fill');
                }
            });

            // --- Logika Validasi Formulir dan Pengalihan Halaman ---
            loginForm.addEventListener('submit', function (event) {
                // Mencegah peramban (browser) memuat ulang halaman secara bawaan
                event.preventDefault();

                // Mengekstraksi nilai input dan menghilangkan spasi berlebih
                const emailValue = emailInput.value.trim();
                const passwordValue = passwordInput.value.trim();

                // Mendefinisikan parameter kredensial untuk tujuan pengujian validasi
                const validEmail = "admin@admin.com";
                const validPassword = "admin123";

                // Evaluasi kondisional berdasarkan parameter kredensial
                if (emailValue === validEmail && passwordValue === validPassword) {
                    // Menyembunyikan elemen peringatan secara empiris apabila kredensial tervalidasi dengan benar
                    formAlert.className = 'alert d-none alert-custom';

                    // Mengeksekusi pengalihan halaman secara asinkron dengan jeda
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    // Mengubah gaya dan teks elemen peringatan menjadi peringatan kesalahan
                    formAlert.className = 'alert alert-danger alert-custom';
                    formAlert.textContent = 'Gagal login: Email atau kata sandi tidak valid.';

                    // Mengembalikan fokus ke kolom kata sandi sebagai penerapan praktik keamanan
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            });
        });
    </script>
</body>

</html>
